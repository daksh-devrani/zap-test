name: Comprehensive Security Scanning (SAST, DAST, SCA)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  security_scan:
    runs-on: ubuntu-latest
    name: Full Security Pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        run: docker run --rm -v "${{ github.workspace }}:/src" -w /src returntocorp/semgrep semgrep scan --config="p/default" --json > semgrep-results.json
        continue-on-error: true

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-results.json

      - name: Build the Docker image
        run: docker build -t vulnerable-app .

      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vulnerable-app'
          format: 'json'
          output: 'trivy-results.json'
          exit-code: '0'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.json

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype Container Scan
        run: grype vulnerable-app -o json > grype-results.json
        continue-on-error: true

      - name: Upload Grype Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-report
          path: grype-results.json

      - name: Run the Docker container
        run: docker run -d -p 5000:5000 --name vulnerable-app-container vulnerable-app

      - name: Wait for application to start
        run: |
          echo "Waiting for application to start..."
          sleep 10
          curl -s http://localhost:5000 > /dev/null || exit 1
          echo "Application is up and running!"

      - name: Start Tracee Runtime Monitoring
        run: |
          docker run -d \
            --name tracee \
            --privileged \
            --pid=host \
            --cgroupns=host \
            -v /etc/os-release:/etc/os-release-host:ro \
            -v /var/run:/var/run:ro \
            -v /tmp:/tmp \
            aquasec/tracee:latest    

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zapreportbaseline'

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zapreportfull'

      - name: Export Tracee Logs
        if: always()
        run: |
          docker logs tracee > tracee-results.txt

      - name: Upload Tracee Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracee-report
          path: tracee-results.txt   

      - name: Stop Tracee
        if: always()
        run: |
          docker stop tracee || true     
