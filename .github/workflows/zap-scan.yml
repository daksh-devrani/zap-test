name: Comprehensive Security Scanning (SAST, DAST, SCA)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  security_scan:
    runs-on: ubuntu-latest
    name: Full Security Pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: "p/default"
          generateSarif: "1"

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep.sarif

      - name: Build the Docker image
        run: docker build -t vulnerable-app .

      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vulnerable-app'
          format: 'json'
          output: 'trivy-results.json'
          exit-code: '0'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.json

      - name: Run Grype Container Scan
        uses: anchore/scan-action@v3
        with:
          image: "vulnerable-app"
          fail-build: false

      - name: Upload Grype Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-report
          path: results.sarif

      - name: Run the Docker container
        run: docker run -d -p 5000:5000 --name vulnerable-app-container vulnerable-app

      - name: Wait for application to start
        run: |
          echo "Waiting for application to start..."
          sleep 10
          curl -s http://localhost:5000 > /dev/null || exit 1
          echo "Application is up and running!"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zapreportbaseline'

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zapreportfull'
