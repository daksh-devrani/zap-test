name: OWASP ZAP Security Scanning

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Build, Run, and Scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build the Docker image
        run: docker build -t vulnerable-app .

      - name: Run the Docker container
        run: docker run -d -p 5000:5000 --name vulnerable-app-container vulnerable-app

      - name: Wait for application to start
        run: |
          echo "Waiting for application to start..."
          sleep 10
          curl -s http://localhost:5000 > /dev/null || exit 1
          echo "Application is up and running!"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000'
          # Set to true if you want the build to fail when issues are found.
          # We'll set to false so it continues to the full scan.
          fail_action: false
          
      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:5000'
          # Set to true to fail the build based on the scan results.
          fail_action: false
